<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f8f9ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a56db;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#93c5fd;stop-opacity:0.1" />
    </linearGradient>
  </defs>
  
  <!-- Base -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Accent shapes -->
  <circle cx="1100" cy="100" r="200" fill="url(#accentGradient)" opacity="0.5"/>
  <circle cx="100" cy="500" r="150" fill="url(#accentGradient)" opacity="0.3"/>
  
  <!-- Content -->
  <text x="60" y="120" font-family="Poppins, Arial, sans-serif" font-size="72" font-weight="700" fill="#1a202c">
    Navyra Studio
  </text>
  
  <text x="60" y="220" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="600" fill="#1a56db">
    Merancang Produk Digital
  </text>
  
  <text x="60" y="280" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="600" fill="#1a56db">
    yang Bertumbuh
  </text>
  
  <text x="60" y="380" font-family="Inter, Arial, sans-serif" font-size="28" fill="#64748b">
    Web Development • UI/UX Design • Branding
  </text>
  
  <!-- Bottom accent -->
  <rect x="60" y="480" width="80" height="4" fill="#1a56db" rx="2"/>
  
  <text x="60" y="540" font-family="Inter, Arial, sans-serif" font-size="20" fill="#475569">
    🎯 50+ Proyek | 🤝 40+ Klien Puas | ⭐ Dipercaya Oleh Puluhan Bisnis
  </text>
  
  <!-- Logo placeholder -->
  <circle cx="1100" cy="530" r="50" fill="#1a56db" opacity="0.1"/>
  <text x="1080" y="550" font-family="Poppins, Arial, sans-serif" font-size="40" font-weight="700" fill="#1a56db">N</text>
</svg>
